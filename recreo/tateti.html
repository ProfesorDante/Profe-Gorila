<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Ta-Te-Ti del Gran Árbol</title>
<style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Arial,sans-serif;background:linear-gradient(#c7ecf0,#dff2d7);color:#183326}
body{display:flex;justify-content:center;align-items:center;padding:8px}.app{width:min(820px,100%);background:#f7f0d0;border:4px solid #446b43;border-radius:22px;overflow:hidden;box-shadow:0 18px 48px #18432944}
header{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;background:linear-gradient(#315f3c,#21462e);color:#fff8df;padding:10px 14px}
.title{font-weight:900;font-size:22px;text-shadow:0 2px #183326}.hud{display:flex;gap:8px;flex-wrap:wrap}.pill{background:#fff8df;color:#25442f;border:2px solid #d2b75a;border-radius:999px;padding:7px 10px;font-weight:900}
main{position:relative;padding:18px;background:linear-gradient(#b9db95,#8fc16f)}
.board{width:min(560px,92vw);aspect-ratio:1;margin:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px;background:#8b5a2b;border:6px solid #65421f;border-radius:24px;box-shadow:0 10px 0 #4f321c,0 16px 30px #0003}
.cell{position:relative;border:0;border-radius:18px;background:linear-gradient(#f4e2ad,#ddc487);box-shadow:inset 0 3px #fff7d6,0 5px #a9793f;cursor:pointer;overflow:hidden}
.cell.dark{background:linear-gradient(#8ab876,#6f9b61);box-shadow:inset 0 3px #acd19f,0 5px #4e7846}.cell.win{animation:pulse .7s infinite alternate}@keyframes pulse{to{filter:brightness(1.35);transform:translateY(-3px)}}
.monkey{position:absolute;inset:10%;display:flex;align-items:center;justify-content:center}.monkey svg{width:100%;height:100%;filter:drop-shadow(0 5px 3px #0004)}
.panel{margin:18px auto 0;width:min(560px,92vw);background:#fff8df;border:3px solid #8b5a2b;border-radius:16px;padding:12px;display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.status{font-weight:900}.controls{display:flex;gap:8px;flex-wrap:wrap}
button.action{border:0;border-radius:14px;padding:11px 14px;font-weight:900;font-size:15px;cursor:pointer;color:white;background:#3f8f51;box-shadow:0 5px #245d35}
button.secondary{background:#4b78a7;box-shadow:0 5px #2f4d70}button.soft{background:#8a6844;box-shadow:0 5px #60482f}
.overlay{position:fixed;inset:0;background:#0e271d9e;display:flex;align-items:center;justify-content:center;padding:18px;z-index:20}
.card{width:min(680px,95%);background:#fff8df;border:4px solid #8b5a2b;border-radius:22px;padding:22px;text-align:center;box-shadow:0 10px #5c3a1f}
.card h1,.card h2{margin:0 0 12px;color:#2b5b39}.menuGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.levels{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.footer{text-align:center;background:#183326;color:#dcebd9;padding:8px;font-size:12px;font-weight:700}

.mobile-label{display:none}
@media(max-width:700px){
  html,body{height:100%;min-height:100%;overflow:hidden}
  body{padding:3px;align-items:flex-start}
  .app{height:100dvh;width:100%;border-width:3px;border-radius:12px;display:flex;flex-direction:column}
  header{padding:6px 8px;gap:5px;justify-content:center;flex:0 0 auto}
  .title{font-size:15px;width:100%;text-align:center;line-height:1.05}
  .hud{gap:5px;justify-content:center}
  .pill{font-size:11px;padding:4px 7px;border-width:1px}
  main{padding:6px;display:flex;flex-direction:column;min-height:0;flex:1}
  .board{
    width:min(100%,calc(100dvh - 176px));
    max-width:none;
    gap:6px;padding:8px;border-width:4px;border-radius:16px;
    box-shadow:0 6px 0 #4f321c,0 10px 18px #0003
  }
  .cell{border-radius:12px}
  .panel{
    width:100%;margin:7px auto 0;padding:7px 8px;gap:6px;
    border-width:2px;border-radius:12px;flex:0 0 auto
  }
  .status{font-size:12px;line-height:1.15;width:100%;text-align:center}
  .controls{width:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
  button.action{padding:8px 6px;font-size:12px;border-radius:10px;box-shadow:0 3px #245d35}
  .desktop-label{display:none}.mobile-label{display:inline}
  .footer{display:none}
  .overlay{padding:8px}
  .card{padding:14px;max-height:94dvh;overflow:auto}
  .card h1{font-size:22px}.card h2{font-size:20px}
  .card p{margin:8px 0;font-size:14px}
  .menuGrid,.levels{grid-template-columns:1fr;gap:8px}
}
@media(max-width:900px) and (orientation:landscape){
  .app{height:100dvh}
  header{padding:4px 8px;flex-wrap:nowrap}
  .title{font-size:14px;width:auto;white-space:nowrap}
  .hud{flex-wrap:nowrap;margin-left:auto}
  main{
    display:grid;grid-template-columns:minmax(0,1fr) 180px;
    align-items:center;gap:7px;padding:5px;overflow:hidden
  }
  .board{
    width:min(calc(100dvh - 54px),calc(100vw - 195px));
    margin:auto;gap:5px;padding:6px;border-width:4px
  }
  .panel{
    width:100%;margin:0;padding:8px;align-self:center;
    display:flex;flex-direction:column
  }
  .status{font-size:12px}
  .controls{grid-template-columns:1fr}
  button.action{min-height:34px}
  .overlay{padding:6px}
  .card{width:min(580px,92%);padding:12px;max-height:94dvh}
  .menuGrid,.levels{grid-template-columns:repeat(2,1fr)}
  .levels{grid-template-columns:repeat(3,1fr)}
}

</style>
</head>
<body>
<div class="app">
<header><div class="title">🐒 TA-TE-TI DEL GRAN ÁRBOL</div><div class="hud"><div class="pill">Turno: <span id="turnLabel">Monito Marrón</span></div><div class="pill">Marcador: <span id="scoreLabel">0 - 0</span></div></div></header>
<main>
<div id="board" class="board"></div>
<div class="panel"><div id="status" class="status">Elegí un modo para comenzar.</div><div class="controls"><button class="action" onclick="restartRound()"><span class="desktop-label">Nueva ronda</span><span class="mobile-label">↻ Ronda</span></button><button class="action secondary" onclick="showMenu()"><span class="desktop-label">Cambiar modo</span><span class="mobile-label">☰ Modo</span></button><button class="action soft" onclick="toggleMusic()">🎵 <span id="musicLabel">Música: sí</span></button></div></div>
</main>
<div class="footer">Una partida breve y tranquila en la Selva del Gran Árbol.</div>
</div>

<div id="menuOverlay" class="overlay"><div class="card"><h1>🌳 Ta-Te-Ti del Gran Árbol</h1><p>Elegí cómo querés jugar.</p><div class="menuGrid"><button class="action" onclick="startPvp()">👥 Dos jugadores</button><button class="action secondary" onclick="showLevels()">🤖 Contra la computadora</button></div></div></div>
<div id="levelsOverlay" class="overlay" style="display:none"><div class="card"><h2>Elegí la dificultad</h2><div class="levels"><button class="action" onclick="startAi('easy')">Fácil</button><button class="action secondary" onclick="startAi('medium')">Medio</button><button class="action soft" onclick="startAi('hard')">Difícil</button></div><div style="margin-top:12px"><button class="action soft" onclick="backToMenu()">Volver</button></div></div></div>
<div id="endOverlay" class="overlay" style="display:none"><div class="card"><h2 id="endTitle"></h2><p id="endText"></p><div class="menuGrid"><button class="action" onclick="nextRound()">Otra ronda</button><button class="action secondary" onclick="showMenu()">Cambiar modo</button></div></div></div>

<script>
const boardEl=document.getElementById('board'),statusEl=document.getElementById('status'),turnLabel=document.getElementById('turnLabel'),scoreLabel=document.getElementById('scoreLabel');
const X='X',O='O',wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let board=Array(9).fill(''),turn=X,mode='pvp',aiLevel='easy',roundOver=false,scores={X:0,O:0},musicOn=true,audioCtx=null,musicTimer=null,musicStep=0,nextAiStarter=X,aiTurnToken=0;
const MASTER_VOLUME=1.8;

function monkeySVG(team){
 const brown=team===X,ring=brown?'#8b5434':'#e0ad42',head=brown?'#5e3827':'#8b572d',face=brown?'#e4b77d':'#f1c983';
 return `<svg viewBox="0 0 100 100"><circle cx="50" cy="52" r="40" fill="${ring}" stroke="#fff2c4" stroke-width="4"/><circle cx="50" cy="48" r="25" fill="${head}"/><circle cx="26" cy="44" r="10" fill="${head}"/><circle cx="74" cy="44" r="10" fill="${head}"/><ellipse cx="50" cy="58" rx="18" ry="14" fill="${face}"/><circle cx="43" cy="45" r="5" fill="#fff"/><circle cx="57" cy="45" r="5" fill="#fff"/><circle cx="43" cy="45" r="2.2" fill="#1d2a23"/><circle cx="57" cy="45" r="2.2" fill="#1d2a23"/><path d="M42 60 Q50 68 58 60" fill="none" stroke="#5b3424" stroke-width="3" stroke-linecap="round"/></svg>`;
}
function render(){
 boardEl.innerHTML='';
 board.forEach((v,i)=>{const c=document.createElement('button');c.className='cell '+(((Math.floor(i/3)+i%3)%2)?'dark':'');c.onclick=()=>playAt(i);if(v){const d=document.createElement('div');d.className='monkey';d.innerHTML=monkeySVG(v);c.appendChild(d)}boardEl.appendChild(c)});
 turnLabel.textContent=turn===X?'Monito Marrón':'Monito Dorado';scoreLabel.textContent=`${scores.X} - ${scores.O}`;
}
function playAt(i){if(roundOver||board[i]||(mode==='ai'&&turn===O))return;place(i,turn);if(!roundOver&&mode==='ai'&&turn===O){statusEl.textContent='La computadora está pensando...';setTimeout(aiMove,350)}}
function place(i,p){board[i]=p;pluck();render();const r=getResult(board);if(r){finish(r);return}turn=turn===X?O:X;statusEl.textContent=turn===X?'Turno del Monito Marrón.':'Turno del Monito Dorado.';render()}
function getResult(b){for(const l of wins){const[a,c,d]=l;if(b[a]&&b[a]===b[c]&&b[a]===b[d])return{winner:b[a],line:l}}if(b.every(Boolean))return{winner:null,line:[]};return null}
function finish(r){roundOver=true;if(r.winner){scores[r.winner]++;render();[...boardEl.children].forEach((c,i)=>c.classList.toggle('win',r.line.includes(i)));winSound();endTitle.textContent='🍃 ¡Qué buena jugada!';endText.textContent=r.winner===X?'Ganó el Monito Marrón.':'Ganó el Monito Dorado.'}else{drawSound();endTitle.textContent='🌿 ¡Partida empatada!';endText.textContent='Los dos equipos jugaron muy bien.'}setTimeout(()=>endOverlay.style.display='flex',450)}
function aiMove(token=aiTurnToken){if(token!==aiTurnToken||roundOver||mode!=='ai'||turn!==O)return;const empty=board.map((v,i)=>v?'':i).filter(v=>v!=='');if(!empty.length)return;let m;if(aiLevel==='easy')m=empty[Math.floor(Math.random()*empty.length)];else if(aiLevel==='medium'){m=findWin(O)??findWin(X);if(m===undefined){const p=[4,0,2,6,8,1,3,5,7].filter(i=>!board[i]);m=Math.random()<.75?p[0]:empty[Math.floor(Math.random()*empty.length)]}}else m=bestMove();place(m,O)}
function findWin(p){for(let i=0;i<9;i++)if(!board[i]){const b=board.slice();b[i]=p;const r=getResult(b);if(r&&r.winner===p)return i}}
function bestMove(){let bs=-Infinity,m=0;for(let i=0;i<9;i++)if(!board[i]){board[i]=O;const s=minimax(false);board[i]='';if(s>bs){bs=s;m=i}}return m}
function minimax(max){const r=getResult(board);if(r)return r.winner===O?10:r.winner===X?-10:0;if(max){let b=-Infinity;for(let i=0;i<9;i++)if(!board[i]){board[i]=O;b=Math.max(b,minimax(false));board[i]=''}return b}else{let b=Infinity;for(let i=0;i<9;i++)if(!board[i]){board[i]=X;b=Math.min(b,minimax(true));board[i]=''}return b}}
function restartRound(){
 aiTurnToken++;
 board=Array(9).fill('');roundOver=false;endOverlay.style.display='none';
 if(mode==='ai'){
  turn=nextAiStarter;
  nextAiStarter=nextAiStarter===X?O:X;
 }else{
  turn=X;
 }
 statusEl.textContent=turn===X?'Turno del Monito Marrón.':'La computadora comienza...';
 render();
 if(mode==='ai'&&turn===O){
  const token=aiTurnToken;
  setTimeout(()=>aiMove(token),500);
 }
}
function nextRound(){restartRound()}
function startPvp(){mode='pvp';scores={X:0,O:0};hideOverlays();restartRound();startMusic()}
function showLevels(){menuOverlay.style.display='none';levelsOverlay.style.display='flex'}
function backToMenu(){levelsOverlay.style.display='none';menuOverlay.style.display='flex'}
function startAi(l){mode='ai';aiLevel=l;scores={X:0,O:0};nextAiStarter=X;hideOverlays();restartRound();startMusic()}
function hideOverlays(){menuOverlay.style.display='none';levelsOverlay.style.display='none';endOverlay.style.display='none'}
function showMenu(){stopMusic();endOverlay.style.display='none';levelsOverlay.style.display='none';menuOverlay.style.display='flex'}

function initAudio(){
 if(!musicOn)return;
 if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
 if(audioCtx.state==='suspended')audioCtx.resume();
}
function tone(f,d,t='sine',v=.03,delay=0){
 if(!musicOn)return;
 initAudio();
 const now=audioCtx.currentTime+delay,o=audioCtx.createOscillator(),g=audioCtx.createGain();
 o.type=t;o.frequency.value=f;
 g.gain.setValueAtTime(0,now);
 g.gain.linearRampToValueAtTime(Math.min(.22,v*MASTER_VOLUME),now+.018);
 g.gain.exponentialRampToValueAtTime(.0001,now+d);
 o.connect(g).connect(audioCtx.destination);o.start(now);o.stop(now+d+.05);
}
function midi(n){return 440*Math.pow(2,(n-69)/12)}
function brass(note,dur=.34,vol=.022,delay=0){
 if(!musicOn)return;
 initAudio();
 const t=audioCtx.currentTime+delay;
 const master=audioCtx.createGain(),filter=audioCtx.createBiquadFilter();
 filter.type='lowpass';filter.frequency.setValueAtTime(1250,t);filter.frequency.linearRampToValueAtTime(2200,t+.07);
 master.gain.setValueAtTime(0,t);master.gain.linearRampToValueAtTime(Math.min(.22,vol*MASTER_VOLUME),t+.025);
 master.gain.exponentialRampToValueAtTime(.0001,t+dur);
 [0,-7].forEach((det,i)=>{
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=i?'sawtooth':'triangle';o.frequency.value=midi(note);o.detune.value=det;
  g.gain.value=i?.24:.76;o.connect(g).connect(filter);
  o.start(t);o.stop(t+dur+.06);
 });
 filter.connect(master).connect(audioCtx.destination);
}
function piano(note,dur=.25,vol=.009,delay=0){
 tone(midi(note),dur,'triangle',vol,delay);
 tone(midi(note)*2,dur*.72,'sine',vol*.20,delay+.01);
}
function brush(delay=0,strong=false){
 if(!musicOn)return;
 initAudio();
 const t=audioCtx.currentTime+delay;
 const len=Math.floor(audioCtx.sampleRate*(strong?.08:.045));
 const b=audioCtx.createBuffer(1,len,audioCtx.sampleRate),data=b.getChannelData(0);
 for(let i=0;i<len;i++)data[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);
 const src=audioCtx.createBufferSource(),f=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
 src.buffer=b;f.type='highpass';f.frequency.value=strong?1500:2600;
 g.gain.setValueAtTime((strong?.010:.005)*MASTER_VOLUME,t);g.gain.exponentialRampToValueAtTime(.0001,t+(strong?.08:.045));
 src.connect(f).connect(g).connect(audioCtx.destination);src.start(t);
}

/* Arreglo original de jazz tradicional de Nueva Orleans
   sobre la melodía de dominio público "When the Saints Go Marching In". */
const SAINTS_MELODY=[
  60,null,64,null,65,null,67,null,
  60,null,64,null,65,null,67,null,
  60,null,64,null,65,null,67,null,
  64,null,60,null,64,null,62,null,
  64,null,64,62,60,null,60,64,
  67,null,67,65,null,65,64,null,
  65,null,67,64,null,62,null,62,
  60,null,null,null,null,null,null,null
];
const JAZZ_CHORDS=[
 [60,64,67,70],[60,64,67,70],
 [65,69,72,75],[60,64,67,70],
 [67,71,74,77],[65,69,72,75],
 [60,64,67,70],[67,71,74,77]
];
const WALKING_BASS=[
 36,40,43,46,41,45,48,45,
 43,47,50,53,36,40,43,46,
 41,45,48,51,36,40,43,46,
 43,47,50,53,36,43,46,47
];
const MUSIC_BPM=116;
const MUSIC_BEAT=60/MUSIC_BPM;
function playMusicStep(){
 if(!musicOn||!audioCtx)return;
 const s=musicStep%64,halfBeat=MUSIC_BEAT/2;
 const melody=SAINTS_MELODY[s];
 if(melody!==null)brass(melody+12,halfBeat*.82,.020,.025);
 if(s%2===0){
  const bass=WALKING_BASS[(s/2)%WALKING_BASS.length];
  piano(bass,MUSIC_BEAT*.75,.013,0);
 }else{
  const chord=JAZZ_CHORDS[Math.floor(s/8)%JAZZ_CHORDS.length];
  chord.forEach((n,i)=>piano(n,MUSIC_BEAT*.38,.0055,.018+i*.012));
  brush(.01,s%4===3);
 }
 musicStep=(musicStep+1)%64;
}
function startMusic(){
 stopMusic();
 if(!musicOn)return;
 initAudio();musicStep=0;playMusicStep();
 musicTimer=setInterval(playMusicStep,Math.round(MUSIC_BEAT*500));
}
function stopMusic(){if(musicTimer){clearInterval(musicTimer);musicTimer=null}}
function toggleMusic(){
 musicOn=!musicOn;
 musicLabel.textContent='Música: '+(musicOn?'sí':'no');
 if(musicOn&&menuOverlay.style.display==='none')startMusic();else stopMusic();
}
function pluck(){tone(660,.1,'triangle',.04);tone(880,.12,'triangle',.03,.06)}
function winSound(){tone(523,.15,'triangle',.05);tone(659,.15,'triangle',.05,.12);tone(784,.25,'triangle',.06,.24)}
function drawSound(){tone(392,.18,'sine',.04);tone(349.23,.22,'sine',.035,.16)}
render();
</script>
</body>
</html>
