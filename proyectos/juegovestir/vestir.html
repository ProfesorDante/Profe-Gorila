<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>El Vestidor del Gran Árbol</title>
<style>
:root{
  --ink:#17352b;--paper:#fff8df;--leaf:#4f8f58;--deep:#214f3a;
  --gold:#f2ca55;--wood:#8b5a2b;--blue:#5b86b4;--rose:#d97c8f;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(#c8edf0,#dff2d7);color:var(--ink)}
body{display:flex;justify-content:center;padding:6px}
button{font:inherit}
.app{width:min(900px,100%);background:#f7f0d0;border:4px solid #446b43;border-radius:22px;overflow:hidden;box-shadow:0 18px 48px rgba(24,67,41,.25)}
header{background:linear-gradient(#315f3c,#21462e);color:#fff8df;padding:12px 14px;text-align:center}
.title{font-size:22px;font-weight:900;text-shadow:0 2px #183326}
.screen{display:none;padding:14px;background:#b9db95;min-height:680px}
.screen.active{display:block}
.card{width:min(650px,100%);margin:0 auto;background:#fff8df;border:4px solid #8b5a2b;border-radius:22px;padding:20px;text-align:center;box-shadow:0 8px #5c3a1f}
.card h1,.card h2{margin:0 0 12px;color:#2b5b39}
.card p{font-size:17px;line-height:1.4}
.choiceGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.choice{border:0;border-radius:18px;background:#fffdf1;border:3px solid #d4b66b;padding:14px;cursor:pointer;box-shadow:0 6px #aa7a40}
.choice:active{transform:translateY(3px);box-shadow:0 3px #7d582e}
.choice svg{width:100%;max-height:230px}
.choice strong{display:block;font-size:22px;color:#315f3c;margin-top:4px}
.btn{border:0;border-radius:14px;padding:12px 15px;font-weight:900;cursor:pointer;color:white;background:#3f8f51;box-shadow:0 5px #245d35}
.btn.secondary{background:#4b78a7;box-shadow:0 5px #2f4d70}
.btn.soft{background:#8a6844;box-shadow:0 5px #60482f}
.btn.rose{background:#c96f87;box-shadow:0 5px #8b4c60}
.btn:active{transform:translateY(3px);box-shadow:0 2px #333}
.modeGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.modeChoice{padding:22px 14px;font-size:20px}
.dressLayout{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:12px}
.stage{position:relative;min-height:610px;border:4px solid #5d844d;border-radius:20px;overflow:hidden;background:linear-gradient(#bfe7ef 0 35%,#96c77c 35%)}
.sun{position:absolute;right:7%;top:5%;width:72px;height:72px;border-radius:50%;background:#f8db72;box-shadow:0 0 0 12px rgba(248,219,114,.18)}
.cloud{position:absolute;left:8%;top:8%;width:100px;height:30px;background:white;border-radius:999px;opacity:.82}
.cloud:before,.cloud:after{content:"";position:absolute;background:white;border-radius:50%}
.cloud:before{width:45px;height:45px;left:15px;top:-18px}.cloud:after{width:52px;height:52px;right:12px;top:-24px}
.prompt{position:absolute;left:50%;top:14px;transform:translateX(-50%);width:min(88%,520px);z-index:8;background:#fff8df;border:3px solid #8b5a2b;border-radius:16px;padding:10px;text-align:center;font-weight:800}
.characterWrap{position:absolute;left:50%;bottom:48px;transform:translateX(-50%);width:310px;height:515px;z-index:4}
.characterWrap svg{width:100%;height:100%;overflow:visible}
.ground{position:absolute;left:0;right:0;bottom:0;height:70px;background:
radial-gradient(circle at 12% 55%,#f7d66f 0 5px,transparent 6px),
radial-gradient(circle at 36% 68%,#f2a1b2 0 5px,transparent 6px),
radial-gradient(circle at 64% 52%,#fff 0 5px,transparent 6px),
radial-gradient(circle at 86% 62%,#f7d66f 0 5px,transparent 6px)}
.panel{background:#fff8df;border:3px solid #8b5a2b;border-radius:18px;padding:12px;box-shadow:0 6px #65421f;display:flex;flex-direction:column;gap:10px;max-height:610px;overflow:auto}
.topActions,.categories,.bottomActions{display:flex;gap:7px;flex-wrap:wrap}
.categories .btn{padding:9px 10px;font-size:14px}
.categories .selected{outline:4px solid #f3cf58;outline-offset:1px}
.items{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.item{min-height:96px;border:2px solid #d7c08e;border-radius:14px;background:#fffdf1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px #c2a46b;padding:5px}
.item:active{transform:translateY(2px);box-shadow:0 2px #a48753}
.item svg{width:80px;height:62px}.item small{font-weight:800;color:#435b48}
.feedback{background:#edf7df;border:2px solid #93b76d;border-radius:14px;padding:9px;font-weight:900;min-height:48px}
.footer{text-align:center;background:#183326;color:#dcebd9;padding:8px;font-size:12px;font-weight:700}
@media(max-width:760px){
  .screen{padding:7px;min-height:0}.dressLayout{grid-template-columns:1fr}
  .stage{min-height:540px}.characterWrap{width:275px;height:465px;bottom:42px}
  .panel{max-height:none}.items{grid-template-columns:repeat(3,1fr)}
  .choiceGrid,.modeGrid{grid-template-columns:1fr}.choice svg{max-height:190px}
}
@media(max-width:430px){
  body{padding:2px}.app{border-radius:12px}.title{font-size:17px}
  .card{padding:14px}.stage{min-height:505px}.characterWrap{width:250px;height:430px}
  .prompt{font-size:13px}.items{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="app">
<header><div class="title">🐒 EL VESTIDOR DEL GRAN ÁRBOL</div></header>

<section id="chooseCharacter" class="screen active">
  <div class="card">
    <h1>¿A quién querés vestir?</h1>
    <p>Elegí un personaje. Después vas a poder cambiarlo cuando quieras.</p>
    <div class="choiceGrid">
      <button class="choice" onclick="chooseCharacter('lila')">
        <div id="previewLila"></div><strong>Lila</strong>
      </button>
      <button class="choice" onclick="chooseCharacter('nito')">
        <div id="previewNito"></div><strong>Nito</strong>
      </button>
    </div>
  </div>
</section>

<section id="chooseMode" class="screen">
  <div class="card">
    <h2>¿Cómo querés jugar?</h2>
    <div class="modeGrid">
      <button class="btn modeChoice" onclick="chooseMode('free')">🎨 Modo libre<br><small>Combiná la ropa como quieras</small></button>
      <button class="btn secondary modeChoice" onclick="chooseMode('challenge')">🧭 Preparar el paseo<br><small>Vestí según cada situación</small></button>
    </div>
    <div style="margin-top:18px"><button class="btn soft" onclick="showScreen('chooseCharacter')">Volver</button></div>
  </div>
</section>

<section id="dresser" class="screen">
  <div class="dressLayout">
    <div class="stage">
      <div class="sun"></div><div class="cloud"></div>
      <div class="prompt" id="prompt">Elegí una prenda para comenzar.</div>
      <div class="characterWrap" id="characterStage"></div>
      <div class="ground"></div>
    </div>

    <aside class="panel">
      <div class="topActions">
        <button class="btn soft" onclick="showScreen('chooseCharacter')">Cambiar personaje</button>
        <button class="btn secondary" onclick="showScreen('chooseMode')">Cambiar modo</button>
        <button class="btn rose" onclick="toggleMusic()">🎵 <span id="musicLabel">Música: sí</span></button>
      </div>

      <div class="categories">
        <button class="btn selected" data-cat="hair" onclick="setCategory('hair',this)">Peinados</button>
        <button class="btn secondary" data-cat="top" onclick="setCategory('top',this)">Parte superior</button>
        <button class="btn soft" data-cat="bottom" onclick="setCategory('bottom',this)">Parte inferior</button>
        <button class="btn rose" data-cat="shoes" onclick="setCategory('shoes',this)">Calzado</button>
        <button class="btn secondary" data-cat="accessory" onclick="setCategory('accessory',this)">Accesorios</button>
      </div>

      <div class="items" id="items"></div>
      <div class="feedback" id="feedback">Tocá una prenda para colocarla.</div>

      <div class="bottomActions">
        <button class="btn" onclick="checkChallenge()">✅ Revisar</button>
        <button class="btn secondary" onclick="newChallenge()">🔄 Nueva situación</button>
        <button class="btn soft" onclick="clearOutfit()">🧺 Quitar todo</button>
      </div>
    </aside>
  </div>
</section>

<div class="footer">Elegir, probar y combinar también es aprender.</div>
</div>

<script>
'use strict';

const outfits={
  lila:{hair:null,top:null,bottom:null,shoes:null,accessory:null},
  nito:{hair:null,top:null,bottom:null,shoes:null,accessory:null}
};
let active='lila',mode='free',category='hair',challengeIndex=0,musicOn=true;
let audioCtx=null,musicTimer=null,musicStep=0,master=null;

const challenges=[
  {text:'Hoy llueve. Prepará al personaje para salir sin mojarse.',need:['rain'],hint:'Buscá botas o paraguas.'},
  {text:'Vamos a explorar un sendero. Elegí algo cómodo y útil.',need:['explore'],hint:'Mochila, botitas o chaleco pueden ayudar.'},
  {text:'Hay un cumpleaños bajo el Gran Árbol.',need:['party'],hint:'Elegí un conjunto especial o un regalo.'},
  {text:'Hace mucho frío esta mañana.',need:['cold'],hint:'Campera, gorro o calzado abrigado.'},
  {text:'Hoy vamos a la escuela.',need:['school'],hint:'Guardapolvo o mochila.'},
  {text:'Es una tarde de sol para jugar afuera.',need:['sun','sport'],hint:'Gorra, short, sandalias o zapatillas.'}
];

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function baseMonkey(kind,preview=false){
  const brown=kind==='nito',fur=brown?'#7a4b2a':'#9a6438',dark=brown?'#5a341f':'#6d4528',face=brown?'#d9a56c':'#f0c482';
  const outfit=outfits[kind];
  return `<svg viewBox="0 0 300 520" aria-label="${kind==='nito'?'Nito':'Lila'}">
    <ellipse cx="150" cy="485" rx="72" ry="15" fill="rgba(0,0,0,.12)"/>
    <path d="M89 301 Q48 332 76 370 Q95 392 111 360" fill="none" stroke="${fur}" stroke-width="20" stroke-linecap="round"/>
    <path d="M211 301 Q252 332 224 370 Q205 392 189 360" fill="none" stroke="${fur}" stroke-width="20" stroke-linecap="round"/>
    <ellipse cx="150" cy="305" rx="73" ry="105" fill="${fur}"/>
    <ellipse cx="150" cy="318" rx="48" ry="74" fill="${face}"/>
    <path d="M119 381 Q108 438 98 470" fill="none" stroke="${fur}" stroke-width="28" stroke-linecap="round"/>
    <path d="M181 381 Q192 438 202 470" fill="none" stroke="${fur}" stroke-width="28" stroke-linecap="round"/>
    <circle cx="150" cy="132" r="80" fill="${fur}"/>
    <circle cx="78" cy="128" r="29" fill="${dark}"/><circle cx="222" cy="128" r="29" fill="${dark}"/>
    <ellipse cx="150" cy="151" rx="55" ry="43" fill="${face}"/>
    <circle cx="126" cy="122" r="11" fill="#fff"/><circle cx="174" cy="122" r="11" fill="#fff"/>
    <circle cx="128" cy="123" r="4.5" fill="#17251f"/><circle cx="172" cy="123" r="4.5" fill="#17251f"/>
    <path d="M130 160 Q150 180 170 160" fill="none" stroke="#5b3424" stroke-width="6" stroke-linecap="round"/>
    ${preview?'':renderOutfitSVG(outfit)}
  </svg>`;
}

function renderOutfitSVG(outfit){
  return [
    outfit.hair?garmentSVG(outfit.hair,'hair'):'',
    outfit.top?garmentSVG(outfit.top,'top'):'',
    outfit.bottom?garmentSVG(outfit.bottom,'bottom'):'',
    outfit.shoes?garmentSVG(outfit.shoes,'shoes'):'',
    outfit.accessory?garmentSVG(outfit.accessory,'accessory'):''
  ].join('');
}

function garmentSVG(item,cat){
  const c=item.color||'#5b86b4',c2=item.color2||shade(c);
  if(cat==='hair'){
    if(item.shape==='bow') return `<g><path d="M150 52 C122 31 101 39 103 67 C106 88 128 92 150 72 C172 92 194 88 197 67 C199 39 178 31 150 52Z" fill="${c}" stroke="#7d3f55" stroke-width="4"/><circle cx="150" cy="63" r="13" fill="${c2}"/></g>`;
    if(item.shape==='hat') return `<g><ellipse cx="150" cy="78" rx="86" ry="22" fill="${c2}"/><path d="M92 77 Q98 20 150 22 Q202 20 208 77Z" fill="${c}" stroke="#7a5b2c" stroke-width="4"/><rect x="108" y="58" width="84" height="16" rx="8" fill="#d97c8f"/></g>`;
    if(item.shape==='cap') return `<g><path d="M92 83 Q98 30 150 31 Q202 30 208 83Z" fill="${c}" stroke="#345f85" stroke-width="4"/><path d="M150 83 Q204 74 225 91 Q185 103 150 95Z" fill="${c2}"/></g>`;
    if(item.shape==='wool') return `<g><path d="M91 87 Q95 29 150 27 Q205 29 209 87Z" fill="${c}" stroke="#6b4a7a" stroke-width="4"/><rect x="88" y="78" width="124" height="24" rx="12" fill="${c2}"/><circle cx="150" cy="25" r="18" fill="${c2}"/></g>`;
    return `<g fill="${c}"><circle cx="109" cy="67" r="22"/><circle cx="137" cy="51" r="25"/><circle cx="166" cy="50" r="25"/><circle cx="193" cy="70" r="22"/></g>`;
  }
  if(cat==='top'){
    if(item.shape==='dress') return `<path d="M94 230 Q112 202 127 199 L173 199 Q188 202 206 230 L190 282 L222 375 Q150 405 78 375 L110 282Z" fill="${c}" stroke="${c2}" stroke-width="5"/>`;
    if(item.shape==='coat') return `<g><path d="M96 229 L126 199 H174 L204 229 L194 355 Q150 371 106 355Z" fill="${c}" stroke="${c2}" stroke-width="5"/><line x1="150" y1="205" x2="150" y2="357" stroke="${c2}" stroke-width="5"/><circle cx="150" cy="250" r="5" fill="#f2ca55"/><circle cx="150" cy="285" r="5" fill="#f2ca55"/></g>`;
    if(item.shape==='smock') return `<g><path d="M98 227 L124 198 H176 L202 227 L194 360 Q150 376 106 360Z" fill="#f3f6ef" stroke="#8ab3c2" stroke-width="5"/><path d="M125 202 Q150 226 175 202" fill="none" stroke="#5b86b4" stroke-width="5"/><rect x="128" y="292" width="44" height="38" rx="7" fill="#d9edf3"/></g>`;
    if(item.shape==='vest') return `<g><path d="M101 226 L126 199 H174 L199 226 L188 351 Q150 365 112 351Z" fill="${c}" stroke="${c2}" stroke-width="5"/><path d="M150 199 L135 255 L150 276 L165 255Z" fill="#f7f0d0"/><rect x="116" y="285" width="24" height="24" rx="4" fill="${c2}"/><rect x="160" y="285" width="24" height="24" rx="4" fill="${c2}"/></g>`;
    return `<path d="M99 230 Q112 203 128 199 H172 Q188 203 201 230 L190 315 Q150 330 110 315Z" fill="${c}" stroke="${c2}" stroke-width="5"/>`;
  }
  if(cat==='bottom'){
    if(item.shape==='skirt') return `<path d="M112 303 H188 L210 400 Q150 418 90 400Z" fill="${c}" stroke="${c2}" stroke-width="5"/>`;
    if(item.shape==='short') return `<path d="M110 303 H190 L195 382 L159 386 L150 338 L141 386 L105 382Z" fill="${c}" stroke="${c2}" stroke-width="5"/>`;
    return `<path d="M110 303 H190 L198 447 L166 447 L150 350 L134 447 L102 447Z" fill="${c}" stroke="${c2}" stroke-width="5"/>`;
  }
  if(cat==='shoes'){
    if(item.shape==='boots') return `<g fill="${c}" stroke="${c2}" stroke-width="5"><path d="M74 425 H126 L129 478 Q103 491 70 479Z"/><path d="M174 425 H226 L230 479 Q197 491 171 478Z"/></g>`;
    if(item.shape==='sandals') return `<g fill="none" stroke="${c}" stroke-width="9" stroke-linecap="round"><path d="M67 472 Q99 490 132 474"/><path d="M168 474 Q201 490 233 472"/><path d="M91 449 L111 476"/><path d="M209 449 L189 476"/></g>`;
    return `<g fill="${c}" stroke="${c2}" stroke-width="5"><path d="M66 458 Q98 438 132 462 Q126 487 68 482Z"/><path d="M168 462 Q202 438 234 458 L232 482 Q174 487 168 462Z"/></g>`;
  }
  if(cat==='accessory'){
    if(item.shape==='umbrella') return `<g><path d="M210 166 Q264 181 256 236 Q235 219 217 234 Q200 214 183 227 Q178 185 210 166Z" fill="${c}" stroke="${c2}" stroke-width="5"/><path d="M210 166 V345 Q210 371 192 365" fill="none" stroke="#6a4930" stroke-width="7" stroke-linecap="round"/></g>`;
    if(item.shape==='bag') return `<g><rect x="202" y="250" width="67" height="92" rx="15" fill="${c}" stroke="${c2}" stroke-width="5"/><path d="M215 255 Q235 218 257 255" fill="none" stroke="${c2}" stroke-width="7"/></g>`;
    if(item.shape==='gift') return `<g><rect x="202" y="290" width="72" height="67" rx="6" fill="${c}" stroke="${c2}" stroke-width="5"/><path d="M238 290 V357 M202 318 H274" stroke="#f2ca55" stroke-width="8"/><path d="M238 290 Q214 266 209 286 Q223 300 238 290 Q262 266 267 286 Q253 300 238 290Z" fill="#f2ca55"/></g>`;
    if(item.shape==='horn') return `<g><path d="M203 258 L270 225 L252 291Z" fill="#f2ca55" stroke="#9b6c1d" stroke-width="5"/><rect x="189" y="255" width="30" height="14" rx="7" fill="#d2a633"/></g>`;
    return `<g><circle cx="238" cy="287" r="31" fill="${c}" stroke="${c2}" stroke-width="5"/><rect x="230" y="318" width="16" height="67" rx="8" fill="${c2}"/></g>`;
  }
  return '';
}

function shade(hex){
  const n=parseInt(hex.slice(1),16),r=Math.max(0,(n>>16)-35),g=Math.max(0,((n>>8)&255)-35),b=Math.max(0,(n&255)-35);
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

const wardrobe={
hair:[
 {name:'Rulos',shape:'curls',color:'#6a3f25',tag:'casual'},
 {name:'Moño',shape:'bow',color:'#d97c8f',tag:'party'},
 {name:'Sombrero',shape:'hat',color:'#e8c66a',tag:'sun'},
 {name:'Gorra',shape:'cap',color:'#5b86b4',tag:'sport'},
 {name:'Gorro',shape:'wool',color:'#9d79b7',tag:'cold'}
],
top:[
 {name:'Remera',shape:'shirt',color:'#65a7cf',tag:'casual'},
 {name:'Vestido',shape:'dress',color:'#d97c8f',tag:'party'},
 {name:'Campera',shape:'coat',color:'#6e8db4',tag:'cold'},
 {name:'Guardapolvo',shape:'smock',color:'#f3f6ef',tag:'school'},
 {name:'Chaleco',shape:'vest',color:'#d49449',tag:'explore'}
],
bottom:[
 {name:'Pantalón',shape:'pants',color:'#5478a6',tag:'casual'},
 {name:'Short',shape:'short',color:'#79a96a',tag:'sun'},
 {name:'Pollera',shape:'skirt',color:'#c98bb9',tag:'party'},
 {name:'Pantalón de lluvia',shape:'pants',color:'#4f83b9',tag:'rain'}
],
shoes:[
 {name:'Zapatillas',shape:'sneakers',color:'#f0f0e8',tag:'sport'},
 {name:'Botas de lluvia',shape:'boots',color:'#f2ca55',tag:'rain'},
 {name:'Zapatos',shape:'sneakers',color:'#70452d',tag:'party'},
 {name:'Sandalias',shape:'sandals',color:'#b77a50',tag:'sun'},
 {name:'Botitas',shape:'boots',color:'#8b5a2b',tag:'explore'}
],
accessory:[
 {name:'Paraguas',shape:'umbrella',color:'#6f9fd1',tag:'rain'},
 {name:'Mochila',shape:'bag',color:'#d47b4b',tag:'school'},
 {name:'Cantimplora',shape:'canteen',color:'#77a971',tag:'explore'},
 {name:'Regalo',shape:'gift',color:'#d97c8f',tag:'party'},
 {name:'Trompeta',shape:'horn',color:'#f2ca55',tag:'music'}
]};

function chooseCharacter(who){
  active=who;showScreen('chooseMode');
}
function chooseMode(m){
  mode=m;showScreen('dresser');
  if(m==='free'){
    document.getElementById('prompt').textContent='Modo libre: combiná la ropa como quieras.';
    document.getElementById('feedback').textContent='No hay respuestas correctas o incorrectas.';
  }else newChallenge();
  renderCharacter();renderItems();
}
function renderCharacter(){
  document.getElementById('characterStage').innerHTML=baseMonkey(active,false);
}
function setCategory(cat,btn){
  category=cat;
  document.querySelectorAll('[data-cat]').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');renderItems();
}
function renderItems(){
  const box=document.getElementById('items');box.innerHTML='';
  wardrobe[category].forEach(item=>{
    const b=document.createElement('button');b.className='item';
    b.innerHTML=`<svg viewBox="0 0 300 520">${garmentSVG(item,category)}</svg><small>${item.name}</small>`;
    b.onclick=()=>equip(item);box.appendChild(b);
  });
}
function equip(item){
  outfits[active][category]=item;renderCharacter();
  document.getElementById('feedback').textContent=`Elegiste: ${item.name}.`;
  pluck();
}
function clearOutfit(){
  Object.keys(outfits[active]).forEach(k=>outfits[active][k]=null);
  renderCharacter();document.getElementById('feedback').textContent='El personaje quedó listo para otra combinación.';
}
function newChallenge(){
  mode='challenge';challengeIndex=(challengeIndex+1)%challenges.length;
  const c=challenges[challengeIndex];
  document.getElementById('prompt').textContent=c.text;
  document.getElementById('feedback').textContent=c.hint;
}
function checkChallenge(){
  if(mode!=='challenge'){document.getElementById('feedback').textContent='En el modo libre no hay una única respuesta correcta.';return}
  const c=challenges[challengeIndex],chosen=Object.values(outfits[active]).filter(Boolean);
  const ok=chosen.some(x=>c.need.includes(x.tag));
  document.getElementById('feedback').textContent=ok?'¡Muy buena elección! Hay algo adecuado para la situación.':'Todavía falta algo importante. Mirá la consigna y probá otra opción.';
  ok?successSound():softBump();
}

function initAudio(){
  if(!musicOn)return;
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
  if(!master){master=audioCtx.createGain();master.gain.value=.45;master.connect(audioCtx.destination)}
}
function midi(n){return 440*Math.pow(2,(n-69)/12)}
function note(n,d=.65,type='triangle',vol=.014,delay=0){
  if(!musicOn)return;initAudio();
  const t=audioCtx.currentTime+delay,o=audioCtx.createOscillator(),g=audioCtx.createGain(),f=audioCtx.createBiquadFilter();
  o.type=type;o.frequency.value=midi(n);f.type='lowpass';f.frequency.value=2100;
  g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(vol,t+.05);g.gain.exponentialRampToValueAtTime(.0001,t+d);
  o.connect(f).connect(g).connect(master);o.start(t);o.stop(t+d+.05)
}
const bars=[
 {bass:51,ch:[58,63,67],mel:[70,72,70]},{bass:48,ch:[55,60,63],mel:[67,70,72]},
 {bass:53,ch:[57,60,65],mel:[69,67,65]},{bass:46,ch:[53,58,62],mel:[65,67,69]},
 {bass:51,ch:[58,63,67],mel:[70,72,75]},{bass:44,ch:[51,56,60],mel:[72,70,68]},
 {bass:46,ch:[53,58,62],mel:[67,65,62]},{bass:51,ch:[58,63,67],mel:[63,67,70]}
];
function playBar(){
  if(!musicOn)return;const b=bars[musicStep%bars.length],beat=.62;
  note(b.bass,beat*2.8,'sine',.014);
  [0,1,2].forEach(i=>{note(b.ch[i],beat*.7,'triangle',.007,beat*(i+.55));note(b.mel[i],beat*.88,'triangle',.012,beat*i)});
  musicStep++;
}
function startMusic(){if(!musicOn)return;stopMusic();initAudio();musicStep=0;playBar();musicTimer=setInterval(playBar,1860)}
function stopMusic(){if(musicTimer){clearInterval(musicTimer);musicTimer=null}}
function toggleMusic(){musicOn=!musicOn;document.getElementById('musicLabel').textContent='Música: '+(musicOn?'sí':'no');musicOn?startMusic():stopMusic()}
function pluck(){note(76,.12,'triangle',.035);note(79,.14,'triangle',.025,.07)}
function successSound(){note(72,.12,'triangle',.035);note(76,.14,'triangle',.03,.08);note(79,.18,'triangle',.025,.16)}
function softBump(){note(52,.13,'sine',.025)}

document.addEventListener('pointerdown',()=>{if(musicOn&&!musicTimer)startMusic()},{once:true});

document.getElementById('previewLila').innerHTML=baseMonkey('lila',true);
document.getElementById('previewNito').innerHTML=baseMonkey('nito',true);
renderItems();
</script>
