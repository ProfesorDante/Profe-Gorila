<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Valor Posicional</title>
<style>
body{font-family:Arial,sans-serif;background:#f6fbff;color:#234;margin:0}
header{background:#fff;padding:22px;text-align:center;border-bottom:4px solid #dcecff}
main{max-width:900px;margin:auto;padding:18px}
.card{background:#fff;border-radius:16px;padding:20px;margin:18px 0;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.numero{font-size:3rem;text-align:center;letter-spacing:6px}
.dest{background:#cfe7ff;border-radius:999px;padding:2px 10px;transition:.25s}
#opts{display:grid;gap:10px;max-width:240px;margin:18px auto}
button{padding:12px;border:none;border-radius:10px;background:#5aa0e6;color:#fff;font-size:1rem;cursor:pointer}
#msg{margin-top:15px;padding:14px;border-radius:10px;display:none}
.ok{background:#dff5e5}.bad{background:#fff1d8}
.placeholder{border:2px dashed #ccd;padding:16px;border-radius:10px}
</style></head>
<body>
<header><h1>🦍 Aula del Profesor Dante</h1><h2>Valor Posicional</h2></header>
<main>
<div class="card">
<h3>1. ¿Cuánto vale?</h3>
<p>Observá el número y elegí cuánto vale la cifra destacada.</p>
<div id="num" class="numero"></div>
<div id="preg" style="text-align:center;font-weight:bold"></div>
<div id="opts"></div>
<div id="msg"></div>
<p style="text-align:center"><button onclick="nuevo()">🔄 Otro número</button></p>
</div>
<div class="card"><h3>2. Ordenar números</h3><div class="placeholder">Próximamente.</div></div>
<div class="card"><h3>3. Transformar números</h3><div class="placeholder">Próximamente.</div></div>
<div class="card"><h3>🦍 Modo Docente</h3><div class="placeholder">Se completará en la versión final.</div></div>
</main>
<script>
let correcta=0,pos=0,dig=0;
function mez(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function nuevo(){
 let n;
 do{
   n=Math.floor(Math.random()*900)+100;
 }while(new Set(String(n)).size<3);
 let s=String(n).split('');
 pos=Math.floor(Math.random()*3);
 dig=Number(s[pos]);
 let html=s.map((c,i)=>i===pos?'<span class="dest">'+c+'</span>':c).join(' ');
 document.getElementById('num').innerHTML=html;
 const lugar=["centenas","decenas","unidades"][pos];
 document.getElementById('preg').textContent="¿Cuánto vale el "+dig+"?";
 correcta=dig*(pos===0?100:pos===1?10:1);
 let ops=mez([dig,dig*10,dig*100]);
 let cont=document.getElementById('opts');cont.innerHTML="";
 ops.forEach(v=>{
   let b=document.createElement("button");
   b.textContent=v;
   b.onclick=()=>verificar(v,lugar);
   cont.appendChild(b);
 });
 let m=document.getElementById('msg');m.style.display="none";m.className="";m.textContent="";
}
function verificar(v,lugar){
 let m=document.getElementById('msg');
 m.style.display="block";
 if(v===correcta){
   m.className="ok";
   m.innerHTML="<b>¡Muy bien!</b><br>Descubriste que el "+dig+" está en las <b>"+lugar+"</b>, por eso vale <b>"+correcta+"</b>.";
 }else{
   m.className="bad";
   m.innerHTML="<b>Todavía no.</b><br>El "+dig+" está en las <b>"+lugar+"</b>, por eso representa <b>"+correcta+"</b>. Mirá el lugar que ocupa e intentá nuevamente.";
 }
}
nuevo();
</script></body></html>
